<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f1f5f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>海山救護義消平台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. 全域鎖定 */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            background: #f1f5f9;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            font-size: 16px; 
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            background: #f1f5f9;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 🚨 LED 紅藍呼吸燈 */
        @keyframes led-breath-red { 0%, 100% { background: rgba(239, 68, 68, 0.4); } 50% { background: rgba(239, 68, 68, 1); box-shadow: 0 0 12px rgba(239, 68, 68, 0.6); } }
        @keyframes led-breath-blue { 0%, 100% { background: rgba(59, 130, 246, 1); box-shadow: 0 0 12px rgba(59, 130, 246, 0.6); } 50% { background: rgba(59, 130, 246, 0.4); } }
        
        .siren-bar { height: 8px; width: 100%; display: flex; overflow: hidden; }
        .siren-red { flex: 1; animation: led-breath-red 2.5s ease-in-out infinite; }
        .siren-blue { flex: 1; animation: led-breath-blue 2.5s ease-in-out infinite; }
        .fixed-siren { position: fixed; top: 0; left: 0; z-index: 100; height: 6px; }

        /* 2. 登入卡片 (已移除燈條) */
        .login-card { 
            background: #ffffff; 
            border: 1px solid rgba(226, 232, 240, 0.5); 
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.12);
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }

        /* 3. 佈局結構 */
        header, nav { flex-shrink: 0; z-index: 50; }
        main { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 20px;
        }

        .med-input { background: #f8fafc !important; border: 1px solid #cbd5e1 !important; border-radius: 16px; font-size: 15px; font-weight: 600; }
        .med-btn { background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%); color: white; border-radius: 16px; font-weight: 800; font-size: 17px; }
        
        .bank-card { flex: 0 0 88%; scroll-snap-align: center; margin-right: 12px; border-radius: 26px; color: white; padding: 24px; min-height: 200px; position: relative; overflow: hidden; }
        .bg-card-blue { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .bg-card-emerald { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        .bg-card-rose { background: linear-gradient(135deg, #be123c 0%, #f43f5e 100%); }
        
        .horizontal-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 12px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .list-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 20px; overflow: hidden; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app">
        <!-- 頂部呼吸燈 (僅在主畫面顯示，融合瀏海區) -->
        <div v-if="currPage !== 'login'" class="siren-bar fixed-siren">
            <div class="siren-red"></div><div class="siren-blue"></div>
        </div>

        <!-- 1. 登入頁面 -->
        <div v-if="currPage === 'login'" class="flex-1 flex flex-col justify-center p-6 fade-in">
            <div class="login-card w-full text-center">
                <!-- 已移除登入卡片內部的呼吸燈條 -->
                <div class="p-8 py-12">
                    <div class="w-16 h-16 mx-auto bg-blue-50 rounded-full flex items-center justify-center border border-blue-200 mb-6 shadow-sm">
                        <i class="fa-solid fa-star-of-life text-3xl text-blue-600"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-800 mb-1">HAISHAN EMS</h1>
                    <p class="text-xs text-blue-600 font-bold tracking-[0.2em] uppercase mb-10">Volunteer Platform</p>
                    
                    <div class="space-y-5 text-left">
                        <select v-model="loginForm.name" class="med-input w-full p-4 pl-5 appearance-none">
                            <option value="" disabled>請選擇人員</option>
                            <option v-for="m in members" :key="m.姓名">{{ m.姓名 }}</option>
                        </select>
                        <input v-model="loginForm.pass" type="password" placeholder="安全密碼" class="med-input w-full p-4 pl-5">
                        <button @click="handleLogin" class="med-btn w-full py-4 mt-8 shadow-md active:scale-95 transition-transform">SECURE LOGIN</button>
                        <p v-if="errMsg" class="text-red-500 text-xs text-center font-bold mt-4">{{ errMsg }}</p>
                    </div>
                </div>
            </div>
            <div class="mt-8 text-center text-[10px] text-slate-400 font-medium tracking-widest uppercase">海山救護義消智慧平台 © 2024</div>
        </div>

        <!-- 2. 主畫面 (登入後) -->
        <template v-else>
            <header class="pt-6 pb-4 px-8 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-600 text-lg font-black shadow-sm border border-slate-200">
                        {{ userData.姓名 ? userData.姓名.charAt(0) : 'E' }}
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold tracking-wider uppercase mb-0.5">Welcome</p>
                        <h2 class="text-lg font-black text-slate-800">{{ userData.姓名 }} 
                            <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full ml-1 align-middle font-bold">{{ userData['duty_title'] || '隊員' }}</span>
                        </h2>
                    </div>
                </div>
                <button @click="logout" class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-slate-400 shadow-sm border border-slate-200">
                    <i class="fa-solid fa-arrow-right-from-bracket text-base"></i>
                </button>
            </header>

            <main class="no-scrollbar">
                <div class="horizontal-scroll px-8 mt-2 mb-4">
                    <!-- 卡片 1: 協勤 -->
                    <div class="bank-card bg-card-blue">
                        <p class="text-xs font-bold opacity-80 uppercase tracking-widest">年度累計協勤</p>
                        <h3 class="text-5xl font-black my-4 tracking-tighter">{{ cleanValue(userData['協勤時數']) }}<span class="text-sm ml-1 font-bold">HR</span></h3>
                        <div class="flex justify-between border-t border-white/20 pt-4">
                            <div><p class="text-[10px] opacity-60 font-bold mb-0.5">出勤次數</p><p class="text-lg font-bold">{{ userData['出勤次數'] || 0 }}</p></div>
                            <div><p class="text-[10px] opacity-60 font-bold mb-0.5">服務年資</p><p class="text-base font-bold">{{ userData['seniority'] || '--' }}</p></div>
                        </div>
                    </div>

                    <!-- 卡片 2: 志工榮譽卡 -->
                    <div class="bank-card bg-card-emerald">
                        <p class="text-xs font-bold opacity-80 uppercase tracking-widest">志工榮譽卡</p>
                        <h3 class="text-2xl font-black my-4 tracking-wide">{{ userData['姓名'] }}</h3>
                        <p class="text-xs text-white font-bold tracking-widest bg-black/20 px-2.5 py-1 rounded-full inline-block mb-3">
                            剩餘 {{ calculateDays(userData['honor_expiry']) }} 天到期
                        </p>
                        <div class="flex justify-between border-t border-white/20 pt-4">
                            <div><p class="text-[10px] opacity-60 font-bold mb-0.5">到期日期</p><p class="text-base font-bold font-mono">{{ userData['honor_expiry'] || '----/--/--' }}</p></div>
                            <div class="text-right"><i class="fa-solid fa-id-card text-xl opacity-40"></i></div>
                        </div>
                    </div>

                    <!-- 卡片 3: EMT 證照 -->
                    <div class="bank-card bg-card-rose mr-8">
                        <p class="text-xs font-bold opacity-80 uppercase tracking-widest">EMT 救護證照</p>
                        <h3 class="text-2xl font-black my-5 tracking-tight">{{ userData['emt_level'] || '救護技術員' }}</h3>
                        <div class="flex justify-between border-t border-white/20 pt-4">
                            <div><p class="text-[10px] opacity-60 font-bold">發證單位</p><p class="text-sm font-bold">新北消防局</p></div>
                            <div class="text-right"><p class="text-[10px] opacity-60 font-bold">到期日</p><p class="text-lg font-bold font-mono">{{ userData['emt_expiry'] || '----/--/--' }}</p></div>
                        </div>
                    </div>
                </div>

                <!-- 快捷功能 -->
                <div class="horizontal-scroll px-8 gap-3 mb-3">
                    <div @click="activeTab = 'stats'" class="w-14 flex flex-col items-center cursor-pointer">
                        <div class="w-14 h-14 rounded-2xl bg-white border flex items-center justify-center mb-1.5" :class="activeTab === 'stats' ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-slate-200 text-slate-400'"><i class="fa-solid fa-chart-pie text-2xl"></i></div>
                        <span class="text-[11px] font-bold" :class="activeTab === 'stats' ? 'text-blue-600' : 'text-slate-500'">統計</span>
                    </div>
                    <div @click="activeTab = 'duty'" class="w-14 flex flex-col items-center cursor-pointer">
                        <div class="w-14 h-14 rounded-2xl bg-white border flex items-center justify-center mb-1.5" :class="activeTab === 'duty' ? 'border-cyan-500 text-cyan-600 bg-cyan-50' : 'border-slate-200 text-slate-400'"><i class="fa-solid fa-clipboard-user text-2xl"></i></div>
                        <span class="text-[11px] font-bold" :class="activeTab === 'duty' ? 'text-cyan-600' : 'text-slate-500'">公差</span>
                    </div>
                </div>

                <!-- 下方數據 -->
                <div class="px-8 mt-2">
                    <div v-if="activeTab === 'stats'" class="fade-in list-card">
                        <div v-for="type in caseTypes" :key="type" class="flex justify-between items-center p-4 border-b border-slate-50 last:border-0">
                            <span class="text-sm font-bold text-slate-700">{{ type }}</span>
                            <span class="text-lg font-black text-blue-600">{{ userData[type] || 0 }}</span>
                        </div>
                    </div>
                    <div v-if="activeTab === 'duty'" class="fade-in space-y-4">
                        <div v-for="group in [{n:'幹部', i:'fa-crown', c:'text-purple-600 bg-purple-50'}, {n:'第一小隊', i:'fa-1', c:'text-orange-600 bg-orange-50'}, {n:'第二小隊', i:'fa-2', c:'text-red-600 bg-red-50'}, {n:'第三小隊', i:'fa-3', c:'text-blue-600 bg-blue-50'}]" :key="group.n" class="list-card shadow-sm">
                            <div class="p-3 px-5 flex justify-between items-center border-b border-slate-100 font-black text-sm" :class="group.c">
                                <span class="flex items-center gap-2"><i :class="['fa-solid', group.i]"></i> {{ group.n }}</span>
                                <span class="bg-white/80 px-2 py-0.5 rounded-full text-[10px]">{{ getGroupTotal(group.n) }} 次</span>
                            </div>
                            <div class="p-1">
                                <div v-for="m in filterByGroup(group.n)" :key="m.姓名" class="flex justify-between p-3 text-sm rounded-xl mb-0.5" :class="m.姓名 === userData.姓名 ? 'bg-cyan-50' : ''">
                                    <span class="font-bold" :class="m.姓名 === userData.姓名 ? 'text-cyan-600' : 'text-slate-700'">{{ m.姓名 }}</span>
                                    <span class="font-black text-slate-400">{{ m.duty_count || 0 }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- 底部導覽 -->
            <nav class="h-20 bg-white/95 backdrop-blur-xl border-t border-slate-200 flex justify-around items-center px-10 pb-8 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                <div @click="activeTab = 'stats'" :class="activeTab === 'stats' ? 'text-blue-600' : 'text-slate-400'" class="flex flex-col items-center">
                    <i class="fa-solid fa-house-chimney text-2xl"></i><span class="text-[10px] font-bold mt-1.5">首頁</span>
                </div>
                <div @click="activeTab = 'duty'" :class="activeTab === 'duty' ? 'text-blue-600' : 'text-slate-400'" class="flex flex-col items-center">
                    <i class="fa-solid fa-clipboard-user text-2xl"></i><span class="text-[10px] font-bold mt-1.5">公差</span>
                </div>
                <div class="flex flex-col items-center text-slate-300"><i class="fa-solid fa-calendar-check text-2xl"></i><span class="text-[10px] font-bold mt-1.5">排班</span></div>
                <div class="flex flex-col items-center text-slate-300"><i class="fa-solid fa-user-nurse text-2xl"></i><span class="text-[10px] font-bold mt-1.5">我的</span></div>
            </nav>
        </template>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzxANy8mkN8BzsGr0SDvGLW_AJ43kRQ1Q",
            authDomain: "star-c5e91.firebaseapp.com",
            projectId: "star-c5e91",
            storageBucket: "star-c5e91.firebasestorage.app",
            messagingSenderId: "804810488246",
            appId: "1:804810488246:web:477340ff049b90ed68e917"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const currPage = ref('login');
                const activeTab = ref('stats'); 
                const members = ref([]);
                const loginForm = ref({ name: '', pass: '' });
                const userData = ref({});
                const errMsg = ref('');
                const caseTypes = ['OHCA','PUA:OHCA','車禍','急病','一般受傷','自殺','路倒','心肌梗塞MI','中風CVA','打架受傷','電梯'];

                onMounted(() => {
                    onSnapshot(collection(db, "members"), (snap) => {
                        members.value = snap.docs.map(doc => doc.data()).sort((a,b) => a.姓名.localeCompare(b.姓名, 'zh-Hant'));
                    });
                });

                const calculateDays = (dateStr) => {
                    if (!dateStr || dateStr === '----/--/--') return '--';
                    const target = new Date(dateStr);
                    const today = new Date();
                    const diff = target - today;
                    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                    return days > 0 ? days : 0;
                };

                const handleLogin = () => {
                    const user = members.value.find(m => m.姓名 === loginForm.value.name && String(m.password) === String(loginForm.value.pass));
                    if (user) { userData.value = user; currPage.value = 'dashboard'; }
                    else { errMsg.value = "密碼錯誤"; }
                };

                const cleanValue = (val) => val ? String(val).replace(/[^0-9.]/g, '') : '0';
                const logout = () => { currPage.value = 'login'; loginForm.value.pass = ''; userData.value = {}; };
                const filterByGroup = (g) => members.value.filter(m => m.duty_group === g);
                const getGroupTotal = (g) => filterByGroup(g).reduce((s, m) => s + (Number(m.duty_count) || 0), 0);
                const totalPublicDuty = computed(() => members.value.reduce((s, m) => s + (Number(m.duty_count) || 0), 0));

                return { currPage, activeTab, members, loginForm, userData, errMsg, caseTypes, handleLogin, logout, cleanValue, filterByGroup, getGroupTotal, calculateDays, totalPublicDuty };
            }
        }).mount('#app');
    </script>
</body>
</html>
